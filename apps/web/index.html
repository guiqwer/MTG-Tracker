<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManaLog</title>
    <script>
      // Rotate the accent through the five colors of Magic (WUBRG) on each visit.
      (function () {
        try {
          var colors = ['white', 'blue', 'black', 'red', 'green']
          var prev = parseInt(localStorage.getItem('mtgAccentIdx') || '-1', 10)
          var i = (isNaN(prev) ? -1 : prev) + 1
          if (i < 0 || i >= colors.length) i = 0
          localStorage.setItem('mtgAccentIdx', String(i))
          var el = document.documentElement
          el.classList.add('mtg-' + colors[i])
          el.setAttribute('data-mtg', colors[i])
        } catch (e) {}
      })()
      // Apply the saved theme before first paint (no flash). Falls back to the
      // OS preference when the user hasn't chosen one.
      ;(function () {
        try {
          var stored = localStorage.getItem('mtgTheme')
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
