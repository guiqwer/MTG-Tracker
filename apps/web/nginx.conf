server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the wire (the JS bundle is the biggest win).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/css
        text/plain
        application/javascript
        application/json
        image/svg+xml
        font/ttf
        font/otf;

    # API calls are proxied to the internal api service (compose DNS name "api").
    # The trailing slash on proxy_pass strips the /api prefix:
    #   /api/players -> http://api:3000/players
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite emits content-hashed filenames — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Accent backdrop art: heavy images that rarely change.
    location /mtg/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: unknown routes serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
