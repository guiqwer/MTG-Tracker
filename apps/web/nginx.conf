server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API calls are proxied to the internal api service (compose DNS name "api").
    # The trailing slash on proxy_pass strips the /api prefix:
    #   /api/players -> http://api:3000/players
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown routes serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
