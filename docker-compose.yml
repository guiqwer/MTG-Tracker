services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mtg}
      POSTGRES_DB: ${POSTGRES_DB:-mtgtracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtg} -d ${POSTGRES_DB:-mtgtracker}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mtg}:${POSTGRES_PASSWORD:-mtg}@db:5432/${POSTGRES_DB:-mtgtracker}?schema=public
      PORT: "3000"
      NODE_ENV: production
      # Auth signing secret — set a strong value in the PDC/Coolify env for prod.
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
    # Internal only — reached by the web service through the nginx proxy.
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    # Public entrypoint: nginx serves the built SPA and proxies /api -> api:3000.
    # On the PDC the domain routes straight to this container port, so no host
    # publish is needed. To reach it locally, publish a port on the fly:
    #   docker compose run --rm --service-ports -p 8080:80 web
    # or add a gitignored docker-compose.override.yml with a `ports:` mapping.
    expose:
      - "80"

volumes:
  pgdata:
